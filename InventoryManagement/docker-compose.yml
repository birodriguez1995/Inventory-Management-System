version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/inventory.db
      - JwtSettings__Secret=inventory-super-secret-key-change-in-production-32chars!!
      - JwtSettings__Issuer=InventoryManagement
      - JwtSettings__Audience=InventoryManagement
      - JwtSettings__ExpiryHours=8
      - LowStockAlert__Threshold=10
      - LowStockAlert__IntervalMinutes=5
    volumes:
      - db_data:/data
    restart: unless-stopped

volumes:
  db_data:
